- shell:
    - wget -qO- https://sh.rustup.rs | sh -s -- -y
    - PATH=$PATH:$HOME/.cargo/bin cargo install stylua

- shell:
    - wget -qO- https://astral.sh/uv/install.sh | sh
    - PATH=$PATH:$HOME/.local/bin uv tool install prek
    - PATH=$PATH:$HOME/.local/bin uv tool install ruff
    - PATH=$PATH:$HOME/.local/bin uv tool install prek
    - PATH=$PATH:$HOME/.local/bin uv tool install mdformat
    - PATH=$PATH:$HOME/.local/bin uv tool install clang-format
    - PATH=$PATH:$HOME/.local/bin uv tool install clangd
    - PATH=$PATH:$HOME/.local/bin uv tool install clangd

- shell:
    - PATH=$PATH:/usr/local/go/bin go install mvdan.cc/sh/v3/cmd/shfmt@latest
    - PATH=$PATH:/usr/local/go/bin go install github.com/google/yamlfmt/cmd/yamlfmt@latest

- link:
    ~/.local/bin:
      glob: true
      path: ~/go/bin/**
